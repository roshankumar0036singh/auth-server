<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Server API - Documentation</title>
    <!-- Professional Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
    <style>
        :root {
            /* Professional Corporate Dark Theme */
            --primary: #3b82f6; /* Blue 500 */
            --primary-hover: #2563eb; /* Blue 600 */
            
            /* Dark Theme Backgrounds */
            --bg-base: #0f1115; /* Deep slate */
            --bg-card: #1e2128; /* Card background */
            --bg-hover: #2a2e37;
            
            /* Text Colors */
            --text-main: #e2e8f0; /* Soft white/slate */
            --text-muted: #94a3b8;
            
            /* Borders */
            --border-color: #334155;
            
            /* HTTP Method Colors */
            --get-color: #3b82f6;
            --post-color: #10b981;
            --put-color: #f59e0b;
            --delete-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Professional Header */
        .header {
            padding: 2.5rem 0;
            background-color: #15181e;
            border-bottom: 1px solid var(--border-color);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-main {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 2rem;
        }

        .header-copy {
            min-width: 0;
        }

        .header-title-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            /* Using an SVG icon instead of emoji */
            width: 32px;
            height: 32px;
            fill: var(--primary);
        }

        .header-title {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        /* Tags / Badges */
        .badges {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .badge.live {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .swagger-login {
            width: min(100%, 460px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
        }

        .swagger-login-title {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .swagger-login-fields {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto auto;
            gap: 0.5rem;
        }

        .swagger-login input {
            width: 100%;
            min-width: 0;
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            font: inherit;
        }

        .swagger-login input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .swagger-login button {
            border: 1px solid var(--primary);
            border-radius: 6px;
            padding: 0.6rem 0.85rem;
            font: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .swagger-login-submit {
            background: var(--primary);
            color: #ffffff;
        }

        .swagger-login-submit:hover {
            background: var(--primary-hover);
        }

        .swagger-login-clear {
            background: transparent;
            color: var(--primary);
        }

        .swagger-login-clear:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .swagger-login-status {
            min-height: 1rem;
            margin-top: 0.65rem;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .swagger-login-status.error {
            color: #f87171;
        }

        .swagger-login-status.success {
            color: #34d399;
        }

        .swagger-login-mfa {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.5rem;
            margin-top: 0.65rem;
        }

        .swagger-login-mfa[hidden] {
            display: none;
        }

        .swagger-login-expiry {
            min-height: 1rem;
            margin-top: 0.35rem;
            color: var(--text-muted);
            font-size: 0.72rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
        }

        /* Swagger Container */
        .swagger-container {
            max-width: 1400px;
            margin: 0 auto 4rem;
            padding: 2rem;
        }

        /* Deep Swagger Overrides */
        .swagger-ui {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .swagger-ui .topbar { display: none; }

        /* General Base Resets */
        .swagger-ui .info,
        .swagger-ui .scheme-container,
        .swagger-ui section.models {
            background: var(--bg-card) !important;
            box-shadow: none !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 8px;
            margin-bottom: 2rem;
            padding: 1.5rem;
        }

        .swagger-ui .info .title {
            color: #ffffff;
            font-weight: 700;
        }

        .swagger-ui p, .swagger-ui li, .swagger-ui h1, .swagger-ui h2, .swagger-ui h3, .swagger-ui h4, .swagger-ui h5 {
            color: var(--text-main) !important;
        }

        /* Opblocks (Endpoints) */
        .swagger-ui .opblock {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            box-shadow: none;
        }

        .swagger-ui .opblock-summary-method {
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 6px 14px;
        }

        /* Method Colors */
        .swagger-ui .opblock.opblock-get .opblock-summary-method { background: var(--get-color); }
        .swagger-ui .opblock.opblock-post .opblock-summary-method { background: var(--post-color); }
        .swagger-ui .opblock.opblock-put .opblock-summary-method { background: var(--put-color); }
        .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: var(--delete-color); }

        .swagger-ui .opblock-summary-path { color: #ffffff !important; font-weight: 500; font-size: 1rem; }
        .swagger-ui .opblock-summary-description { color: var(--text-muted) !important; }
        
        /* Body sections & Headers */
        .swagger-ui .opblock-section-header {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border-bottom: 1px solid var(--border-color) !important;
            box-shadow: none !important;
        }
        
        .swagger-ui .opblock-section-header h4 {
            color: #ffffff !important;
        }

        .swagger-ui .opblock-body pre.microlight {
            background: #000000 !important;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        /* Inputs & Tables */
        .swagger-ui input[type=email],
        .swagger-ui input[type=password],
        .swagger-ui input[type=search],
        .swagger-ui input[type=text],
        .swagger-ui textarea,
        .swagger-ui select {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 6px;
            padding: 8px 12px;
        }

        .swagger-ui input:focus, .swagger-ui textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        .swagger-ui table thead tr th,
        .swagger-ui table thead tr td,
        .swagger-ui table tbody tr td {
            color: var(--text-main) !important;
            border-bottom: 1px solid var(--border-color);
        }

        .swagger-ui .response-col_status {
            color: #ffffff !important;
            font-weight: 700;
        }

        .swagger-ui .response-col_description {
            color: var(--text-muted) !important;
        }

        .swagger-ui .parameter__name { color: var(--text-main) !important; font-weight: 600;}
        .swagger-ui .parameter__type { color: var(--text-muted) !important; }
        
        /* Scheme Container & Servers */
        .swagger-ui .scheme-container .servers-title,
        .swagger-ui .scheme-container .schemes-title {
            color: #ffffff !important;
        }

        /* Authorize Button */
        .swagger-ui .btn.authorize {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 6px;
            padding: 8px 20px;
            font-weight: 600;
            box-shadow: none;
        }
        .swagger-ui .btn.authorize:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }
        .swagger-ui .btn.authorize svg { fill: var(--primary); }

        /* FIX: Authorization Modal Visibility */
        .swagger-ui .dialog-ux .modal-ux {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        .swagger-ui .dialog-ux .modal-ux-header {
            border-bottom: 1px solid var(--border-color);
        }
        .swagger-ui .dialog-ux .modal-ux-header h3 {
            color: #ffffff !important;
        }
        .swagger-ui .dialog-ux .modal-ux-content h4 {
            color: #ffffff !important;
        }
        .swagger-ui .dialog-ux .modal-ux-content p {
            color: var(--text-muted) !important;
        }
        .swagger-ui .dialog-ux .modal-ux-header .close-modal {
            fill: #ffffff;
        }
        .swagger-ui .dialog-ux .auth-btn-wrapper .btn-done,
        .swagger-ui .dialog-ux .auth-btn-wrapper .btn-authorize {
            color: #ffffff;
            background-color: var(--primary);
            border-color: var(--primary);
        }

        /* Models Section */
        .swagger-ui .model-title,
        .swagger-ui .model {
            color: var(--text-main) !important;
        }
        .swagger-ui section.models .property.primitive { color: var(--text-muted); }
        .swagger-ui section.models .model-container { background: transparent; }
        
        /* Expand/Collapse Arrows */
        .swagger-ui .opblock-control-arrow,
        .swagger-ui .expand-methods svg,
        .swagger-ui .expand-operation svg {
            fill: var(--text-muted) !important;
        }

        @media (max-width: 960px) {
            .header-main {
                flex-direction: column;
            }

            .swagger-login {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 1.5rem 0;
            }

            .header-content {
                padding: 0 1rem;
            }

            .swagger-container {
                padding: 1rem;
            }

            .swagger-login-fields {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <div class="header-main">
                <div class="header-copy">
                    <div class="header-title-row">
                        <!-- Professional SVG Shield Icon -->
                        <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <h1 class="header-title">Auth Server API</h1>
                    </div>
                    <p class="header-subtitle">Next-Generation Authentication & Authorization API</p>

                    <div class="badges">
                        <div class="badge live">
                            <span class="status-dot"></span>
                            <span>Operational</span>
                        </div>
                        <div class="badge">v1.0.0</div>
                        <div class="badge">Go / Gin</div>
                        <div class="badge">PostgreSQL + Redis</div>
                        <div class="badge">OAuth 2.0</div>
                    </div>
                </div>
                <form id="swagger-login-form" class="swagger-login" autocomplete="on">
                    <div class="swagger-login-title">Swagger Login</div>
                    <div class="swagger-login-fields">
                        <input id="swagger-login-email" type="email" name="email" placeholder="Email" aria-label="Email" autocomplete="username" required>
                        <input id="swagger-login-password" type="password" name="password" placeholder="Password" aria-label="Password" autocomplete="current-password" required>
                        <button id="swagger-login-submit" class="swagger-login-submit" type="submit">Login</button>
                        <button id="swagger-login-clear" class="swagger-login-clear" type="button">Clear</button>
                    </div>
                    <div id="swagger-login-mfa" class="swagger-login-mfa" hidden>
                        <input id="swagger-login-mfa-code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="MFA code" aria-label="MFA code" autocomplete="one-time-code">
                        <button id="swagger-login-mfa-submit" class="swagger-login-submit" type="button">Verify</button>
                    </div>
                    <output id="swagger-login-status" class="swagger-login-status" aria-live="polite"></output>
                    <div id="swagger-login-expiry" class="swagger-login-expiry" aria-hidden="true"></div>
                </form>
            </div>
        </div>
    </header>

    <main class="swagger-container">
        <div id="swagger-ui"></div>
    </main>

    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"
            integrity="sha384-qn5tagrAjZi8cSmvZ+k3zk4+eDEEUcP9myuR2J6V+/H6rne++v6ChO7EeHAEzqxQ"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"
            integrity="sha384-SiLF+uYBf9lVQW98s/XUYP14enXJN31bn0zu3BS1WFqr5hvnMF+w132WkE/v0uJw"
            crossorigin="anonymous"></script>
    <script>
        // Held in memory only; never persisted to storage so an XSS payload
        // cannot read a token at rest. Re-login is required after a reload.
        let swaggerAccessToken = null;
        // Short-lived token returned by the password step when MFA is enabled;
        // it is exchanged for an access token at /api/auth/login/mfa.
        let swaggerMfaToken = null;
        let swaggerExpiryTimer = null;

        function setSwaggerLoginStatus(message, type) {
            const status = document.getElementById("swagger-login-status");
            status.textContent = message;
            status.classList.remove("error", "success");
            if (type) {
                status.classList.add(type);
            }
        }

        // Reads the `exp` claim (seconds since epoch) from a JWT without
        // trusting it for anything security-sensitive; it only drives the
        // expiry countdown shown to the user.
        function getTokenExpiryMs(accessToken) {
            try {
                let base64 = accessToken.split(".")[1].replaceAll("-", "+").replaceAll("_", "/");
                // JWT payloads are unpadded base64url; pad so atob() works everywhere.
                while (base64.length % 4 !== 0) {
                    base64 += "=";
                }
                const claims = JSON.parse(atob(base64));
                return typeof claims.exp === "number" ? claims.exp * 1000 : null;
            } catch {
                // Malformed token: skip the expiry display rather than fail login.
                return null;
            }
        }

        function formatRemaining(ms) {
            const totalSeconds = Math.max(0, Math.round(ms / 1000));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
        }

        // The countdown ticks every second, so it lives in its own non-live
        // element to avoid spamming screen readers; the aria-live status is
        // reserved for one-off state changes (authorized, errors, expiry).
        function setExpiryText(message) {
            document.getElementById("swagger-login-expiry").textContent = message;
        }

        function stopExpiryCountdown() {
            if (swaggerExpiryTimer !== null) {
                clearInterval(swaggerExpiryTimer);
                swaggerExpiryTimer = null;
            }
            setExpiryText("");
        }

        function startExpiryCountdown(expiryMs) {
            stopExpiryCountdown();
            if (expiryMs === null) {
                return;
            }
            const render = () => {
                const remaining = expiryMs - Date.now();
                if (remaining <= 0) {
                    stopExpiryCountdown();
                    swaggerAccessToken = null;
                    if (globalThis.ui && globalThis.ui.authActions) {
                        globalThis.ui.authActions.logout(["BearerAuth"]);
                    }
                    setSwaggerLoginStatus("Session expired — log in again", "error");
                    return;
                }
                setExpiryText(`Expires in ${formatRemaining(remaining)}`);
            };
            render();
            swaggerExpiryTimer = setInterval(render, 1000);
        }

        function authorizeSwagger(accessToken) {
            globalThis.ui.preauthorizeApiKey("BearerAuth", `Bearer ${accessToken}`);
            swaggerAccessToken = accessToken;
            setSwaggerLoginStatus("Authorized", "success");
            startExpiryCountdown(getTokenExpiryMs(accessToken));
        }

        function showMfaStep() {
            document.getElementById("swagger-login-mfa").hidden = false;
            document.getElementById("swagger-login-mfa-code").focus();
            setSwaggerLoginStatus("Enter the code from your authenticator app", "");
        }

        function hideMfaStep() {
            document.getElementById("swagger-login-mfa").hidden = true;
            document.getElementById("swagger-login-mfa-code").value = "";
        }

        function clearSwaggerAuth() {
            stopExpiryCountdown();
            swaggerAccessToken = null;
            swaggerMfaToken = null;
            hideMfaStep();
            if (globalThis.ui && globalThis.ui.authActions) {
                globalThis.ui.authActions.logout(["BearerAuth"]);
            }
            setSwaggerLoginStatus("Authorization cleared", "");
        }

        async function handleSwaggerLogin(event) {
            event.preventDefault();

            const form = event.currentTarget;
            const submitButton = document.getElementById("swagger-login-submit");
            const email = document.getElementById("swagger-login-email").value.trim();
            const passwordInput = document.getElementById("swagger-login-password");

            submitButton.disabled = true;
            setSwaggerLoginStatus("Signing in...", "");

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password: passwordInput.value })
                });
                const payload = await response.json().catch(() => ({}));
                const data = (payload && payload.data) || {};

                if (!response.ok) {
                    throw new Error((payload.error && payload.error.message) || payload.message || "Login failed");
                }

                // MFA-enabled account: the password step succeeded but an
                // authenticator code is still required. Reveal the code step
                // and exchange the MFA token at /api/auth/login/mfa.
                if (data.mfaRequired) {
                    swaggerMfaToken = data.mfaToken;
                    form.reset();
                    showMfaStep();
                    return;
                }

                if (!data.accessToken) {
                    throw new Error("Login response did not include an access token");
                }

                authorizeSwagger(data.accessToken);
                form.reset();
            } catch (error) {
                setSwaggerLoginStatus(error.message || "Login failed", "error");
            } finally {
                submitButton.disabled = false;
            }
        }

        async function handleSwaggerMfa() {
            const codeInput = document.getElementById("swagger-login-mfa-code");
            const mfaSubmit = document.getElementById("swagger-login-mfa-submit");
            const code = codeInput.value.trim();

            if (!swaggerMfaToken) {
                setSwaggerLoginStatus("Start by entering your email and password", "error");
                return;
            }
            if (!/^\d{6}$/.test(code)) {
                setSwaggerLoginStatus("Enter the 6-digit MFA code", "error");
                return;
            }

            mfaSubmit.disabled = true;
            setSwaggerLoginStatus("Verifying code...", "");

            try {
                const response = await fetch("/api/auth/login/mfa", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mfaToken: swaggerMfaToken, code })
                });
                const payload = await response.json().catch(() => ({}));
                const data = (payload && payload.data) || {};

                if (!response.ok) {
                    throw new Error((payload.error && payload.error.message) || payload.message || "MFA verification failed");
                }
                if (!data.accessToken) {
                    throw new Error("MFA response did not include an access token");
                }

                swaggerMfaToken = null;
                hideMfaStep();
                authorizeSwagger(data.accessToken);
            } catch (error) {
                setSwaggerLoginStatus(error.message || "MFA verification failed", "error");
            } finally {
                mfaSubmit.disabled = false;
            }
        }

        window.onload = function () {
            window.ui = SwaggerUIBundle({
                url: "./swagger.json",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout",
                defaultModelsExpandDepth: 1,
                defaultModelExpandDepth: 1,
                docExpansion: "list",
                filter: true,
                showRequestHeaders: true,
                supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch']
            });

            document.getElementById("swagger-login-form").addEventListener("submit", handleSwaggerLogin);
            document.getElementById("swagger-login-clear").addEventListener("click", clearSwaggerAuth);
            document.getElementById("swagger-login-mfa-submit").addEventListener("click", handleSwaggerMfa);
            document.getElementById("swagger-login-mfa-code").addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    handleSwaggerMfa();
                }
            });
        };
    </script>
</body>
</html>
