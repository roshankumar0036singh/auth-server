basePath: /
definitions:
  github_com_roshankumar0036singh_auth-server_internal_dto.ChangePasswordRequest:
    properties:
      currentPassword:
        type: string
      newPassword:
        minLength: 8
        type: string
    required:
    - currentPassword
    - newPassword
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.LogoutRequest:
    properties:
      refreshToken:
        type: string
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.MFADisableRequest:
    properties:
      code:
        type: string
      password:
        description: Password re-authenticates the user for this sensitive operation
        type: string
    required:
    - code
    - password
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.MFALoginRequest:
    properties:
      code:
        type: string
      mfaToken:
        type: string
    required:
    - code
    - mfaToken
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.MFAVerifyRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.RegisterRequest:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.ResendVerificationRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.ResetPasswordRequest:
    properties:
      password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  github_com_roshankumar0036singh_auth-server_internal_dto.UpdateProfileRequest:
    properties:
      firstName:
        maxLength: 100
        type: string
      lastName:
        maxLength: 100
        type: string
      phone:
        maxLength: 20
        type: string
    type: object
  github_com_roshankumar0036singh_auth-server_internal_models.OAuthClient:
    properties:
      client_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      is_public:
        type: boolean
      name:
        type: string
      owner_id:
        type: string
      redirect_uris:
        items:
          type: string
        type: array
      scopes:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  github_com_roshankumar0036singh_auth-server_internal_utils.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  github_com_roshankumar0036singh_auth-server_internal_utils.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_roshankumar0036singh_auth-server_internal_utils.ErrorDetail'
      message:
        type: string
      success:
        type: boolean
    type: object
  internal_handler.CreateOAuthClientRequest:
    properties:
      is_public:
        type: boolean
      name:
        type: string
      redirect_uris:
        items:
          type: string
        minItems: 1
        type: array
      scopes:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - name
    - redirect_uris
    - scopes
    type: object
  internal_handler.CreateOAuthClientResponse:
    properties:
      data:
        $ref: '#/definitions/internal_handler.OAuthClientData'
      message:
        type: string
      success:
        type: boolean
    type: object
  internal_handler.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
      message:
        type: string
    type: object
  internal_handler.ListOAuthClientsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_roshankumar0036singh_auth-server_internal_models.OAuthClient'
        type: array
      success:
        type: boolean
    type: object
  internal_handler.OAuthClientData:
    properties:
      client_id:
        type: string
      client_secret:
        description: Only in creation response
        type: string
      created_at: {}
      id:
        type: string
      name:
        type: string
      redirect_uris:
        items:
          type: string
        type: array
      scopes:
        items:
          type: string
        type: array
    type: object
  internal_handler.ProviderConfigRequest:
    properties:
      provider_client_id:
        type: string
      provider_client_secret:
        type: string
    required:
    - provider_client_id
    - provider_client_secret
    type: object
  internal_handler.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      scope:
        type: string
      token_type:
        type: string
    type: object
  internal_handler.UserInfoResponse:
    properties:
      email:
        type: string
      email_verified:
        type: boolean
      family_name:
        type: string
      given_name:
        type: string
      name:
        type: string
      picture:
        type: string
      scopes:
        items:
          type: string
        type: array
      sub:
        type: string
    type: object
host: localhost:8080
info:
